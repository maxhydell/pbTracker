<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Pickleball Tracker</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>
<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<!-- LOADING SCREEN -->
<div id="loading-screen">
  <div class="loading-text">
    <span class="word1">PICKLEBALL</span>
    <span class="word2">TRACKER</span>
    <img class="ball" src="pickleball.png">
  </div>
</div>

<!-- APP -->
<div class="app">

  <div class="top-bar">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <div class="title">Pickleball Tracker</div>
  </div>

  <div id="sideMenu" class="side-menu">
    <button onclick="navigate('input')">🏠 Dashboard</button>
    <button onclick="navigate('rankings')">📊 Rankings</button>
    <button onclick="navigate('schedule')">📅 Schedule</button>
    <button onclick="navigate('input')">🎾 Sets</button>
  </div>

  <!-- PAGES -->
<div id="input" class="page active">
    <h1>Today's Matches</h1>
    <div id="dashboardAnalytics" class="analytics-grid"></div>

    <div id="setsContainer"></div>

    <div class="card">
      <button onclick="finishDay()">DONE</button>
      <div id="dayStats"></div>
    </div>
  </div>

  <div id="rankings" class="page">
    <div class="rank-card">
      <div class="rank-header">
        <div>
          <h2>Rankings</h2>
          <p> </p>
          <div class="form-control">
            <label class="label">
              <span class="label-text font-medium">Player</span>
            </label>
            <div class="block">
              <select id="playerSelect" class="select select-bordered" onchange="loadRankings()"></select>
            </div>
          </div>
        </div>
        <div class="rank-score">
          <div id="bigStat">--</div>
          <p id="topPercent">Top --%</p>
          <div id="analytics"></div>
        </div>
      </div>

      <p class="sub">Last 90 days</p>

      <canvas id="chart"></canvas>
      <div id="leaderboard"></div>
    </div>
  </div>

  <div id="schedule" class="page">
    <h1>Schedule</h1>

    <div id="addModal" class="modal" style="display:none;">
      <div class="modal-content">
        <input id="newName" placeholder="Name">
        <input id="newPhone" placeholder="Phone">
        <input id="newRating" placeholder="Rating">
        <div class="modal-actions">
          <button onclick="submitNewPlayer()">Add</button>
          <button onclick="document.getElementById('addModal').style.display='none'">Cancel</button>
        </div>
      </div>
    </div>

    <div class="schedule-header">
      <div>
        <h2>This Week</h2>
        <div class="week-range" id="weekRange">4/6 - 4/10</div>
      </div>

      <div class="add-player-btn" onclick="openAddPlayer()">
        + Add Player
      </div>
    </div>

    <div id="scheduleList"></div>



  <div id="sets" class="page">
    <h1>Current Sets</h1>
    <div id="setsList"></div>
  </div>







</div> <script src="app.js"></script>
</body>
</html>
