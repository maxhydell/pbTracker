<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="logo.png">
<title>Pickleball Tracker</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>
<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<!-- LOADING SCREEN -->
<div id="loading-screen">
  <div class="loading-text">
    <span class="word1">PICKLEBALL</span>
    <span class="word2">TRACKER</span>
    <img class="ball" src="pickleball.png">
  </div>
</div>

<!-- APP -->
<div class="app">

  <div class="top-bar">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <div class="title">Pickleball Tracker</div>
  </div>

  <div id="sideMenu" class="side-menu">
    <button onclick="navigate('input')">🏠 Dashboard</button>
    <button onclick="navigate('rankings')">📊 Rankings</button>
    <button onclick="navigate('schedule')">📅 Schedule</button>
    <button onclick="navigate('sets')">🎾 Sets</button>
  </div>

  <!-- PAGES -->

  <div id="input" class="page active">
    <h1>Today's Matches</h1>

    <div id="setsContainer"></div>

    <div class="card">
      <button onclick="generateGames()">Generate Games</button>
      <button onclick="completeDay()">Finish Day</button>
    </div>
  </div>

  <div id="rankings" class="page">
    <div class="rank-card">
      <div class="rank-header">
        <div>
          <h2>Bite Strength</h2>
          <p>Based on tournament performance</p>
        </div>
        <div class="rank-score">
          <div id="bigStat">--</div>
          <p id="topPercent">Top --%</p>
        </div>
      </div>

    <p class="sub">Last 90 days</p>

    <canvas id="chart"></canvas>
  </div>
</div>

  <div id="schedule" class="page">
    <h1>Schedule</h1>
    <div id="scheduleList"></div>
  </div>

  <div id="sets" class="page">
    <h1>Current Sets</h1>
    <div id="setsList"></div>
  </div>



  </div>


  <div class="card">
    <button onclick="finishDay()">DONE</button>
    <div id="dayStats"></div>
  </div>


</div>

<script src="app.js"></script>
</body>
</html>
