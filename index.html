<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickleball Tracker</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<!-- LOADING SCREEN -->
<div id="loading-screen">
  <div class="loading-text">
    <span class="word1">PICKLEBALL</span>
    <span class="word2">TRACKER</span>
    <img class="ball" src="https://upload.wikimedia.org/wikipedia/commons/7/7a/Pickleball_ball.png">
  </div>
</div>

<!-- APP -->
<div class="app">

  <div class="top-bar">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <div class="title">Pickleball Tracker</div>
  </div>

  <div id="sideMenu" class="side-menu">
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('rankings')">Rankings</button>
    <button onclick="showPage('schedule')">Schedule</button>
    <button onclick="showPage('sets')">Sets</button>
  </div>

  <!-- PAGES -->

  <div id="home" class="page active">
    <h1>Today's Matches</h1>
    <div id="setsContainer"></div>
  </div>
    <h1>Dashboard</h1>

    <div class="card">
      <button onclick="generateGames()">Generate Games</button>
      <button onclick="completeDay()">Finish Day</button>
    </div>

    <div class="card" id="liveStatus"></div>
  </div>

  <div id="rankings" class="page">
    <h1>Rankings</h1>
    <canvas id="chart"></canvas>
  </div>

  <div id="schedule" class="page">
    <h1>Schedule</h1>
    <div id="scheduleList"></div>
  </div>

  <div id="sets" class="page">
    <h1>Current Sets</h1>
    <div id="setsList"></div>
  </div>

  <div id="input" class="page">
    <h1>Enter Score</h1>

    <div class="card">
      <div class="grid">
        <button onclick="setScore(1,1)">Set1 Game1</button>
        <button onclick="setScore(1,2)">Set1 Game2</button>
        <button onclick="setScore(1,3)">Set1 Game3</button>
      </div>
    </div>
  </div>

  <!-- TAB BAR -->
  <div class="tab-bar">
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('rankings')">Rankings</button>
    <button onclick="showPage('schedule')">Schedule</button>
    <button onclick="showPage('sets')">Sets</button>
    <button onclick="showPage('input')">Input</button>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
