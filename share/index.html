<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pickleball Tracker</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1 class="title">🏓 Pickleball Tracker</h1>
  <p class="subtitle">Track games. Compete. Improve.</p>

  <div id="leaderboard" class="card"></div>

  <div class="card">
    <div class="card-title">Features</div>
    <div>📊 Live Rankings</div>
    <div>📅 Smart Scheduling</div>
    <div>🏆 Match Tracking</div>
    <div>📈 Player Analytics</div>
  </div>

  <button class="install-btn" onclick="showInstallGuide()">
    📲 Install App
  </button>

  <button class="enter-btn" onclick="enterApp()">
    Enter App →
  </button>

</div>

<script src="app.js"></script>
</body>
</html>
